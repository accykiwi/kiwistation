<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiwi Station — Design Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: #242424;
      --pink: #E8637A;
      --cream: #F0EBE0;
      --muted: #666666;
      --green: #5CDB8E;
      --orange: #E8924E;
      --yellow: #E8D44E;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: var(--font-mono);
      font-size: 12px;
      min-height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .designer-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .designer-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
    }

    .designer-header h1 {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 3px;
    }

    .designer-buttons {
      display: flex;
      gap: 12px;
    }

    button {
      background: var(--pink);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 11px;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--orange);
    }

    button.secondary {
      background: var(--surface2);
      color: var(--cream);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      border-color: var(--pink);
    }

    .designer-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .preview-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: rgba(0,0,0,0.3);
    }

    .section-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 6px;
      cursor: move;
      transition: all 0.2s;
      user-select: none;
    }

    .section-item:hover {
      border-color: var(--pink);
      background: rgba(232,99,122,0.05);
    }

    .section-item.dragging {
      opacity: 0.5;
      transform: scale(0.95);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .section-name {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .section-controls {
      display: flex;
      gap: 8px;
    }

    .section-controls button {
      padding: 4px 8px;
      font-size: 10px;
    }

    .settings-panel {
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 20px;
    }

    .settings-group {
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .settings-group:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    .color-input {
      width: 100%;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      background: var(--surface2);
    }

    .color-item {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .color-item-label {
      flex: 1;
      font-size: 11px;
    }

    .color-item input {
      width: 40px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
    }

    .toggle-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toggle-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--surface2);
      border-radius: 4px;
      cursor: pointer;
    }

    .toggle-item input {
      cursor: pointer;
    }

    .toggle-label {
      flex: 1;
      font-size: 11px;
    }

    .status-message {
      padding: 12px 16px;
      background: var(--green);
      color: var(--bg);
      font-weight: 700;
      border-radius: 4px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="designer-main">
  <div class="designer-header">
    <h1>DESIGN MODE</h1>
    <div class="designer-buttons">
      <button class="secondary" onclick="previewDashboard()">👁 Preview</button>
      <button onclick="saveLiveDesign()">💾 Save Design</button>
      <button class="secondary" onclick="exitDesigner()">✕ Close</button>
    </div>
  </div>

  <div class="designer-body">
    <div class="preview-area">
      <div id="status"></div>
      <div class="section-list" id="section-list"></div>
    </div>

    <div class="settings-panel">
      <div class="settings-group">
        <label class="settings-label">Theme Colors</label>
        <div class="color-item">
          <span class="color-item-label">Background</span>
          <input type="color" id="color-bg" class="color-input">
        </div>
        <div class="color-item">
          <span class="color-item-label">Surface</span>
          <input type="color" id="color-surface" class="color-input">
        </div>
        <div class="color-item">
          <span class="color-item-label">Accent (Pink)</span>
          <input type="color" id="color-pink" class="color-input">
        </div>
        <div class="color-item">
          <span class="color-item-label">Text</span>
          <input type="color" id="color-cream" class="color-input">
        </div>
      </div>

      <div class="settings-group">
        <label class="settings-label">Section Visibility</label>
        <div class="toggle-group" id="visibility-toggles"></div>
      </div>

      <div class="settings-group">
        <button onclick="resetDesign()" class="secondary" style="width:100%">Reset to Default</button>
      </div>
    </div>
  </div>
</div>

<script>
let layoutConfig = {};

const SECTIONS = [
  { id: 'markets', name: 'Markets Widget', visible: true },
  { id: 'home', name: 'Home Panel', visible: true },
  { id: 'profile', name: 'Profile', visible: true },
  { id: 'memory', name: 'Memory Log', visible: true },
  { id: 'upload', name: 'Media Library', visible: true },
  { id: 'income', name: 'Income Streams', visible: true },
];

async function init() {
  try {
    const res = await fetch('/api/brain');
    const brain = await res.json();
    layoutConfig = brain.layout || {};
  } catch (e) {
    layoutConfig = {};
  }

  loadColorSettings();
  renderSections();
  renderVisibilityToggles();
}

function loadColorSettings() {
  const theme = layoutConfig.theme || {};
  document.getElementById('color-bg').value = theme.bg || '#080808';
  document.getElementById('color-surface').value = theme.surface || '#111111';
  document.getElementById('color-pink').value = theme.pink || '#E8637A';
  document.getElementById('color-cream').value = theme.cream || '#F0EBE0';

  document.getElementById('color-bg').addEventListener('change', updateTheme);
  document.getElementById('color-surface').addEventListener('change', updateTheme);
  document.getElementById('color-pink').addEventListener('change', updateTheme);
  document.getElementById('color-cream').addEventListener('change', updateTheme);
}

function updateTheme() {
  const theme = {
    bg: document.getElementById('color-bg').value,
    surface: document.getElementById('color-surface').value,
    pink: document.getElementById('color-pink').value,
    cream: document.getElementById('color-cream').value,
  };

  document.documentElement.style.setProperty('--bg', theme.bg);
  document.documentElement.style.setProperty('--surface', theme.surface);
  document.documentElement.style.setProperty('--pink', theme.pink);
  document.documentElement.style.setProperty('--cream', theme.cream);

  layoutConfig.theme = theme;
}

function renderSections() {
  const list = document.getElementById('section-list');
  list.innerHTML = SECTIONS.map((sec) => `
    <div class="section-item" draggable="true" data-id="${sec.id}">
      <div class="section-header">
        <span class="section-name">☰ ${sec.name}</span>
        <div class="section-controls">
          <button class="secondary" onclick="toggleVisibility('${sec.id}')">
            ${getVisibility(sec.id) ? '👁 Hide' : '🚫 Show'}
          </button>
        </div>
      </div>
      <div style="font-size:10px;color:var(--muted)">Drag to reorder • Visibility: ${getVisibility(sec.id) ? 'On' : 'Off'}</div>
    </div>
  `).join('');
}

function renderVisibilityToggles() {
  const group = document.getElementById('visibility-toggles');
  group.innerHTML = SECTIONS.map(sec => `
    <label class="toggle-item">
      <input type="checkbox" ${getVisibility(sec.id) ? 'checked' : ''} onchange="toggleVisibility('${sec.id}')">
      <span class="toggle-label">${sec.name}</span>
    </label>
  `).join('');
}

function getVisibility(id) {
  if (!layoutConfig.sections) layoutConfig.sections = {};
  return layoutConfig.sections[id] !== false;
}

function toggleVisibility(id) {
  if (!layoutConfig.sections) layoutConfig.sections = {};
  layoutConfig.sections[id] = !getVisibility(id);
  renderSections();
  renderVisibilityToggles();
  showStatus(SECTIONS.find(s => s.id === id).name + (getVisibility(id) ? ' shown' : ' hidden'));
}

function showStatus(msg) {
  const el = document.getElementById('status');
  el.innerHTML = '<div class="status-message">' + msg + '</div>';
  setTimeout(() => { el.innerHTML = ''; }, 2000);
}

async function saveLiveDesign() {
  try {
    const res = await fetch('/api/brain');
    const brain = await res.json();
    brain.layout = layoutConfig;

    const saveRes = await fetch('/api/brain', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(brain)
    });

    if (!saveRes.ok) throw new Error('Save failed');
    showStatus('Design saved!');
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function resetDesign() {
  if (!confirm('Reset to default design?')) return;
  layoutConfig = {};
  document.documentElement.style.setProperty('--bg', '#080808');
  document.documentElement.style.setProperty('--surface', '#111111');
  document.documentElement.style.setProperty('--pink', '#E8637A');
  document.documentElement.style.setProperty('--cream', '#F0EBE0');
  loadColorSettings();
  renderSections();
  renderVisibilityToggles();
  showStatus('Design reset');
}

function previewDashboard() {
  saveLiveDesign().then(() => {
    window.open('/', '_blank');
  });
}

function exitDesigner() {
  if (confirm('Exit design mode?')) {
    window.location.href = '/';
  }
}

init();
</script>

</body>
</html>
